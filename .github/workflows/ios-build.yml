name: Build Unsigned iOS IPA

# 手动触发：在 GitHub 仓库的 Actions 标签页点击 "Run workflow" 即可
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # 不写死具体版本号，直接拉取当前最新的稳定版 Flutter，避免因为版本号写错/过期导致下载失败
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 环境体检（方便排查问题，即使失败也会继续跑后面的步骤）
        run: flutter doctor -v
        continue-on-error: true

      - name: 生成 iOS 平台工程（如果尚未生成）
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: 拉取 Flutter 依赖
        run: flutter pub get

      # 关键一步：flutter create + pub get 之后 ios/Podfile 其实还不存在（这是较新版本
      # Flutter 的正常行为，Podfile 改成按需生成）。用 --config-only 让 Flutter 只生成
      # Xcode / CocoaPods 需要的配置文件（包含 Podfile 和 Generated.xcconfig），
      # 但不做完整编译，这样我们才能在真正构建之前先拿到 Podfile 去做后续修改。
      - name: 生成 Podfile 等配置文件（不做完整编译）
        run: flutter build ios --release --no-codesign --config-only

      - name: 确认 Podfile 已生成
        run: |
          if [ ! -f "ios/Podfile" ]; then
            echo "❌ ios/Podfile 仍然不存在，请把这一步完整日志发给我进一步排查"
            exit 1
          fi
          echo "✅ ios/Podfile 已生成："
          cat ios/Podfile

      - name: 修正 iOS 最低系统版本 & Info.plist 权限说明
        run: |
          # 把 Podfile 里的最低 iOS 版本统一设为 13.0（不管原来是被注释掉的默认值，
          # 还是已经写了别的版本号，都强制改成 13.0），避免个别插件要求的最低版本
          # 比默认值更高导致 CocoaPods 解析失败。用 || true 保证即使某一条 sed 没匹配上
          # 也不会导致整个步骤失败。
          sed -i '' "s/# platform :ios, '.*'/platform :ios, '13.0'/" ios/Podfile || true
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '13.0'/" ios/Podfile || true

          # 补充相册访问的隐私说明文案（部分工具会用到系统选图/选文件功能，
          # iOS 要求 Info.plist 里必须有这个字段，否则运行时会直接崩溃）。
          # 如果这个 key 已经存在（重复运行时），Add 会报错，所以用 || 兜底改成 Set。
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string This app needs photo library access so you can pick an image to process." ios/Runner/Info.plist \
            || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription This app needs photo library access so you can pick an image to process." ios/Runner/Info.plist \
            || true

      - name: 安装 CocoaPods 依赖（Podfile 改动后重新安装一次，报错时日志更清晰）
        run: |
          cd ios
          pod install --repo-update --verbose
          cd ..

      - name: 构建未签名的 iOS Release 包
        run: |
          flutter build ios --release --no-codesign --verbose 2>&1 | tee ios_build.log

      - name: 打包为 Payload/*.ipa 结构
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r NaiLongToolbox-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: NaiLongToolbox-unsigned-ipa
          path: build/ios/iphoneos/NaiLongToolbox-unsigned.ipa

      # 不管前面成功还是失败，都会上传完整构建日志，方便排查问题
      - name: 上传构建日志（无论成功或失败都会执行）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios_build.log
          if-no-files-found: ignore
