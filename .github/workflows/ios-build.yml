name: Build Unsigned iOS IPA

# 手动触发：在 GitHub 仓库的 Actions 标签页点击 "Run workflow" 即可
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # 不写死具体版本号，直接拉取当前最新的稳定版 Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 环境体检（方便排查问题，即使失败也会继续跑后面的步骤）
        run: flutter doctor -v
        continue-on-error: true

      - name: 生成 iOS 平台工程（如果尚未生成）
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: 补充 Info.plist 权限说明
        run: |
          # 部分工具会用到系统选图/选文件功能，iOS 要求 Info.plist 里必须有相册访问的
          # 权限说明文案，否则运行时会直接崩溃。这一步跟依赖管理方式（CocoaPods 还是
          # 较新的 Swift Package Manager）完全无关，可以放心先做。
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string This app needs photo library access so you can pick an image to process." ios/Runner/Info.plist \
            || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription This app needs photo library access so you can pick an image to process." ios/Runner/Info.plist \
            || true

      - name: 拉取 Flutter 依赖
        run: flutter pub get

      # 不再手动生成/修改 Podfile、不再手动跑 pod install。
      # 从 Flutter 3.44 开始，iOS 原生依赖默认已经改用 Swift Package Manager 而不是
      # CocoaPods，Podfile 很可能根本不存在，强行按 CocoaPods 的方式去处理反而会出错。
      # 直接把这一切交给 flutter build 自己处理（不管它内部用的是 SPM 还是 CocoaPods），
      # 这是官方支持、最不容易出问题的标准路径。
      - name: 构建未签名的 iOS Release 包
        run: flutter build ios --release --no-codesign --verbose 2>&1 | tee ios_build.log

      - name: 打包为 Payload/*.ipa 结构
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r NaiLongToolbox-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: NaiLongToolbox-unsigned-ipa
          path: build/ios/iphoneos/NaiLongToolbox-unsigned.ipa

      # 不管前面成功还是失败，都会把完整构建日志作为 Artifact 上传，方便排查问题
      - name: 上传构建日志（无论成功或失败都会执行）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios_build.log
          if-no-files-found: ignore
