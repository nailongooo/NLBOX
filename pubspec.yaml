name: nailong_toolbox
description: "奶龙工具箱 - 多功能本地工具箱 (Flutter 跨平台)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  # 路由（支持 Web 独立 URL）
  go_router: ^14.2.7
  # 本地键值存储：收藏 / 历史 / 设置
  shared_preferences: ^2.2.3
  # 日期格式化
  intl: ^0.19.0
  # UUID 生成
  uuid: ^4.4.2
  # 哈希算法 MD5/SHA1/SHA256/SHA512
  crypto: ^3.0.3
  # base64 / utf8 等编解码辅助
  convert: ^3.1.1
  # 文本对称加密 AES
  encrypt: ^5.0.3
  # 图片解码/编码/压缩/缩放/旋转/滤镜（纯 Dart，全平台可用）
  image: ^4.2.0
  # 跨平台选择文件（含 Web，可直接拿字节数组）
  file_picker: ^8.1.2
  # 获取本地目录（非 Web 保存文件用）
  path_provider: ^2.1.4
  # 调用系统分享面板
  share_plus: ^10.0.2
  # 二维码生成
  qr_flutter: ^4.1.0
  # 打开链接（关于页、隐私政策等）
  url_launcher: ^6.3.0
  # App 版本信息
  package_info_plus: ^8.0.2
  # 网络请求（仅用于 IP 查询等少数联网工具）
  http: ^1.2.2
  # Markdown 预览渲染
  flutter_markdown: ^0.7.3
  # 数学表达式求值（计算器）
  math_expressions: ^2.6.0
  # XML 解析与格式化
  xml: ^6.5.0
  # 图标
  cupertino_icons: ^1.0.8
  # 精确处理 Unicode 字符（字数统计等用到）
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
